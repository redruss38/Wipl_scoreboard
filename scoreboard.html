<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WIPL Dynamic Scoreboard</title>
<style>
  body {
    margin: 0;
    background: transparent;
    font-family: 'Arial Black', sans-serif;
  }

  .wrapper {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* WIPL Logo */
  .logo {
    margin-top: 20px;
    font-size: 3em;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 10px #00aaff;
  }

  /* BEST OF */
  .bestof {
    margin-top: 10px;
    font-size: 1.4em;
    color: white;
    letter-spacing: 2px;
    text-shadow: 0 0 8px #00aaff;
  }

  /* Scoreboard Row */
  .row {
    margin-top: 20px;
    display: flex;
    gap: 20px;
  }

  .box {
    min-width: 140px;
    padding: 18px 25px;
    background: rgba(0,0,0,0.65);
    border: 4px solid #00aaff;
    border-radius: 10px;
    color: white;
    font-size: 2.4em;
    text-align: center;
    text-shadow: 0 0 10px #00aaff;
  }

  .smallbox {
    min-width: 90px;
    padding: 15px 20px;
    background: rgba(0,0,0,0.65);
    border: 4px solid #00aaff;
    border-radius: 10px;
    color: white;
    font-size: 2.2em;
    text-align: center;
    text-shadow: 0 0 10px #00aaff;
  }
</style>
</head>

<body>
<div class="wrapper">

  <div class="logo">WIPL</div>
  <div class="bestof">BEST OF</div>

  <div class="row">
    <div id="left" class="box">JOSH</div>

    <div id="mid1" class="smallbox">1</div>
    <div id="mid2" class="smallbox">7</div>
    <div id="mid3" class="smallbox">0</div>

    <div id="right" class="box">STE</div>
  </div>

</div>

<script>
async function update() {
  try {
    const res = await fetch("https://your-json-file-url.json");
    const data = await res.json();

    document.getElementById("left").textContent = data.left;
    document.getElementById("right").textContent = data.right;

    document.getElementById("mid1").textContent = data.mid1;
    document.getElementById("mid2").textContent = data.mid2;
    document.getElementById("mid3").textContent = data.mid3;

  } catch (e) {
    console.log("Waiting for JSON updates…");
  }
}

setInterval(update, 2000);
</script>

</body>
</html>
